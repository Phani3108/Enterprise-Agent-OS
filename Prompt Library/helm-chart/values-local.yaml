# Local testing values
# Override production values for local Kubernetes (colima) testing

# Use local image built with 'make build'
image:
  repository: library
  repositoryPath: zeta-prompt-library
  pullPolicy: Never  # Use local image, don't pull from registry
  tag: "latest"

envs:
  - name: environmentName
    value: local

# Override Vault-injected environment variables with local values
# These override the vault: references in values.yaml
envProperties:
  DATABASE_URL: "postgresql://agent_nexus_zeta_prompt_library_pg_0_0:changeme@postgres-service:5432/agent_nexus_zeta_prompt_library_pg_0_0"
  DIRECT_URL: "postgresql://agent_nexus_zeta_prompt_library_pg_0_0:changeme@postgres-service:5432/agent_nexus_zeta_prompt_library_pg_0_0"
  AUTH_TRUST_HOST: "true"
  NEXTAUTH_URL: "http://localhost:4444"
  SEED_DATABASE: "true"
  # Secrets are injected at deploy-time from .env via 'make helm-deploy' / 'make helm-upgrade'
  # Do NOT hardcode AUTH_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, or CRON_SECRET here

# Disable properties configmap for local (no olympus cluster configmap available)
properties: {}
disablePropertiesConfigMap: true

# Disable ingress for local testing
ingress:
  enabled: false

# Disable service monitor for local testing (no Prometheus)
serviceMonitor:
  enabled: false

# Minimal resources for local testing
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Faster probes for local testing
service:
  healthCheckPath: /api/health
  livenessProbeInitialDelaySeconds: 30
  livenessFrequency: 15
  readinessProbeInitialDelaySeconds: 15
  readinessFrequency: 5
  startupProbeFailureThreshold: 10

# Relax security context for local testing
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
