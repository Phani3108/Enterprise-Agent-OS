# -- Enable springboot metrics service monitor (required for springboot application only)
springbootHttpScrapeConfig:
  # -- enable scraping of springboot prometheus based metrics
  disabled: false
  # -- interval for springboot prometheus scraping
  interval: 60s
  # -- Timeout for springboot prometheus scraping
  scrapeTimeout: 10s
  # -- Path for springboot prometheus scraping
  path: "/prometheus"

# -- Enable oms metrics service monitor (required for oms application only)
omsHttpScrapeConfig:
  # -- enable scraping of oms prometheus based metrics
  disabled: false
  # -- interval for oms prometheus scraping
  interval: 60s
  # -- Timeout for oms prometheus scraping
  scrapeTimeout: 10s
  # -- Path for oms prometheus scraping
  path: "/_metrics/"

# -- Enable jmx metrics service monitor (required for all application)
jmxScrapeConfig:
  # -- enable scraping of jmx metrics
  disabled: false
  # -- interval for jmx prometheus scraping
  interval: 60s
  # -- Timeout for jmx prometheus scraping
  scrapeTimeout: 10s
  # -- Path for jmx prometheus scraping
  path: "/"

# Configuration for the CronJob
cronJob:
  # Flag to enable or disable the CronJob
  enabled: false

  # The schedule for the CronJob in Cron format
  # In this example, it runs at 12:00 AM every day
  schedule: "0 0 * * *"

  # Restart policy for the CronJob in case of failures
  # Valid values: OnFailure, Never, or Always
  restartPolicy: "OnFailure"

  # Complete specification for the CronJob template
  spec:
    ## Uncomment to use the initContainer in the CronJob.
    # # InitContainers running before the main containers start
    # initContainers:
    #   - name: init-container
    #     image: init-image:latest
    #     command: ["/bin/bash", "init-script.sh"]

    # Containers running within the CronJob
    containers:
      - name: nginx
        image: 813361731051.dkr.ecr.ap-south-1.amazonaws.com/dockerhub:nginx_non_root_v5
        # Command to execute within the container
        # In this example, it runs a script.sh file using "/bin/bash"
        command:
          - "/bin/bash"
          - "script.sh"

# -- Enable write access to EBS attached to the node for applications (required for applications using Atropos)
enableAtroposEbs:
  # -- Disabled by default.
  # -- To enable this, add this enableAtroposEbs to your application helm chart value.yaml and change inDeployment to true.
  inDeployment: false
  initContainer: {}
    # image: 813361731051.dkr.ecr.ap-south-1.amazonaws.com/permission-changer:1.0.0
    # resources: {}
  tolerations: []
    # - effect: NoSchedule
    #   key: atropos
    #   operator: Equal
    #   value: enabled-values
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms: []
          # - matchExpressions:
          #     - key: atropos-ebs
          #       operator: In
          #       values:
          #         - enabled
HeraclesClusterRoute:
  enabled: false             # Enables or disables the rendering of the HeraclesClusterRoute

HeraclesDomain:
  enabled: false

HeraclesPathRouter:
  enabled: false

HeraclesDomainSpec:
  enabled: false


