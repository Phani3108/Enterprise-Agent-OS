# -- Provide a name in place of .Chart.Name
nameOverride: ""
# -- String to fully override "common.fullname"
fullnameOverride: ""
# -- name of the service account created
serviceAccountName: ""

# -- Name of OMS service name (required for OMS application only)
omsAppName: ""

# -- Number of instances of the application
replicaCount: 3
hpa:
  # -- Enable HPA
  enabled: true
  # -- Maximum number of replicas for the HPA. We get the minimum from `replicaCount`
  maxReplicas: 4
  # -- Average CPU utilization percentage for the pods
  cpu: 80
  # -- Average memory utilization percentage for the pods
  mem: false
  # -- Custom metrics or additional metrics to be added in spec.metrics section of HPA
  additionalMetrics:
    # -- an example of adding metric of ContainerResource type
    - type: ContainerResource
      containerResource:
        name: cpu
        container: application
        target:
          type: Utilization
          averageUtilization: 60
  # -- override the default behavior of HPA
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

image:
  # -- OCI Repository Base URL.
  repository: 813361731051.dkr.ecr.ap-south-1.amazonaws.com
  # -- Image Name
  repositoryPath: ""
  # -- Image Tag
  # @default -- .Chart.AppVersion
  tag:
  # -- Image pull policy applied to the deployment.
  pullPolicy: IfNotPresent

imagePullSecrets:
  enabled: false
  name: jfrog-secret

# -- all use of gotemplate in envProperties and volumeMounts
useGoTemplate: false

# -- environment variables for the deployment
envs: [ ]
#  - name: environmentName
#    value: "stage"


# -- environment variables for the deployment using configMapRef from `{{ .Chart.Name }}-env-configmap`. Supports gotemplate.
envProperties: { }
#  ENV: something
#  BASE_URL: api.{{.Values.olympusLabels.olympusZoneEnv}}.zetaapps.in


# -- Specify how many old replicaSets of deployment to retain.
revisionHistoryLimit: 3

# -- specify priorityClassName for the pods in the deployment
priorityClassName:

service:
  # -- OMS only. Port at which OMS application is listening to.
  omsPort: 9091
  # -- Springboot only. Port at which application (inside container) is listening to.
  targetPort: 80
  # -- Port at which k8s service will be listening at.
  port: 80
  # -- OMS only. HTTP listener
  omsHttpPort: 9099

  # -- add annotations to your service
  annotations: { }
  #    "ingress.kubernetes.io/service-upstream": "true"

  # - set it true, to make the service headless
  isHeadless: false # https://kubernetes.io/docs/concepts/services-networking/service/#headless-services

  # - set it true, to make the service type NodePort
  isNodePort: false # https://cloud.google.com/kubernetes-engine/docs/how-to/exposing-apps#creating_a_service_of_type_nodeport
  isLoadBalancer: false

  # -- Springboot only Define `path` used for liveliness and readiness probe.
  healthCheckPath: "/status"
  # -- Springboot only. initialDelaySeconds for liveliness probe. in seconds.
  livenessProbeInitialDelaySeconds: 10
  # -- Springboot only. one liveliness probe at each given second
  livenessFrequency: 15
  # -- Springboot only. Failure Thershold for liveness probe (count)
  livenessFailureThreshold: 3
  # -- Springboot only. initialDelaySeconds for readiness probe. in seconds.
  readinessProbeInitialDelaySeconds: 15
  # -- Springboot only. one readiness probe at each given second.
  readinessFrequency: 30
  # -- Springboot only. Failure Thershold for readiness probe (count)
  readinessFailureThreshold: 3
  # -- Springboot only. add httpHeaders for livenessProbe and readinessProbe probes.
  probeHttpHeaders: { }
  #    - name: X-B3-Sampled # this can be used to disable tracing for health check paths
  #      value: "0"

# -- specify resources for the deployment. Otherwise, default namespace requests and limits will be applied
# @default -- injected by namespace's default requests/limits specification
resources: { }
# limits:
#  cpu: 100m
#  memory: 128Mi
# requests:
#  cpu: 100m
#  memory: 128Mi

# -- specify log4Olympus configurations. Note that defaults are already in place for these properties and these should be modified only if required.
log4Olympus:
  # -- Disable the entire feature of dynamic log level control by setting this value to "true". By default this feature will be enabled. Rest of the attributes here have no relevance if this attribute is set to "true"
  dynamicConfigDisabled: false
  # -- The path inside the pod at which log4olympus config map will be mounted to. The default value is "/app/dynamicL4O2Config"
  mountPath: /app/dynamicL4O2Config
  # -- Map of logger name and desired log level (in caps). By default, "log4olympus" (also configurable) is used a prefix for specifying logger names. The logger name "root" (also configurable) is used to denote the root log level of the app.
  config:
    log4olympus_root: INFO
    log4olympus_olympus.common.executors.MonitoredTask: ERROR

serviceMonitor:
  # -- Enable a prometheus ServiceMonitor
  enabled: false
  monitors:
    - name: jmx
      # -- labels attached to service monitor. `prometheus: zone-monitoring` is required.
      # @default -- {}
      labels:
        prometheus: zone-monitoring
      # -- "Name" of the service port for scraping metrics. Example: jmxmetrics
      port: ""
      # -- Timeout after which the scrape is ended
      # @default -- "10s"
      scrapeTimeout: 10s
      # -- Interval at which metrics should be scraped
      # @default -- "60s"
      interval: 60s
      # -- HTTP path to scrape for metrics
      # @default -- "/"
      path: "/"
      # -- used for `namespaceSelector`.
      # @default -- "{{ .Release.Namespace }}"
      matchNamespace: ""
      # -- used for `selector`.
      # @default -- '{ "common.labels" }'
      matchLabels: { }

probe:
  # -- Enable/Disable the prometheus probe feature
  enabled: false
  targets:
    - name: probe-name
      # -- to disable/enable this particular probe
      enabled: false
      # -- List of URLs fow which health check should be configured.
      urls:
        - "https://zeta.tech"
      # -- Dictionary of labels for Probe CR
      labels: { }
      # -- Dictionary of labels for adding in the metrics
      mertriclabels: { }
      # -- Interval at which url should be probed
      # @default -- "120s"
      interval: 60s
      # -- Timeout after which the scrape is ended
      # @default -- "5s"
      scrapeTimeout: 10s
      # Module used for scraping. Overrides value set in `defaults`
      # @default -- "http_2xx"
      module: http_2xx

httpHealthCheckServiceMonitor:
  # -- Enable a prometheus http health check service monitor
  enabled: false
  targets:
    - name: service-monitor-name
      # -- The URL fow which health check should be configured. Example: http://google.com
      url: ""
      # -- List of labels for ServiceMonitor.
      labels: { }
      # -- Interval at which url should be probed
      # @default -- "120s"
      interval: 120s
      # -- Timeout after which the scrape is ended
      # @default -- "5s"
      scrapeTimeout: 5s
      # Module used for scraping. Overrides value set in `defaults`
      module: http_2xx

heraclesRouteSpec:
