ingress:
  # -- annotations for ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: proteus.example.com
      paths: [ "/" ]

  tls: [ ]
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

logrotation:
  # -- enables logrotation sidecar for the deployment
  enabled: false
  # -- directory path inside your container where you want to rotate logs
  # @default -- /logs/"common.fullname"
  logDirectory: ""
  # -- max size that single log file OR log file size that triggers log rotation
  logMaxSize: 100M
  # -- maximum number of logs file to keep
  maxCountRotated: 5
  # -- image tag to be used for logrotate image
  imageTag: v0.0.3
  # -- resources to be provided for logrotation sidecar
  # resources:
  #   requests:
  #     memory: 12Mi
  #     cpu: 0.5m
  #   limits:
  #     memory: 32Mi
  #     cpu: 1m

# -- enables sidecar in OMS and Springboot deployment. We can add upto 2 sidecars using this
sidecar: { }

postgres:
  # -- Internal being true will create service-postgresql service to connect to postgresql service directly.
  internal: false
  # -- This should be required when internal is false so service-postgresql service can be configured to connect to this hostname
  hostname: psql-hostname


deploymentStrategy:
  # -- enables manual specification the Deployment `strategy`
  enabled: false
  strategy:
    # -- strategy.type to be used. "Recreate", "RollingUpdate'
    type: RollingUpdate
    # -- if `strategy.type` is `RollingUpdate`, specify rolling update configs
    rollingUpdate:
      # -- [max surge](https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#max-surge)
      maxSurge: 25%       # https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#max-surge
      # -- [max-unavailable](https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#max-unavailable)
      maxUnavailable: 25%


containerLifecycleControl:
  # -- enables terminationGracePeriodSeconds
  enabled: true
  # -- Allow application to gracefully disconnect from clients by waiting x before terminating pods
  terminationGracePeriodSeconds: 30

# -- Labels for the pods
additionalPodLabels: { }

# -- Annotations for the pods
additionalPodAnnotations: { }

# -- [NodeSelector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)
nodeSelector: { }

# -- [Tolerations for use with node taints](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/)
tolerations: [ ]

# -- [Assign custom affinity rules to the deployment](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)
affinity: { }

# -- [Disable topolologyAwareHints annotation to the Service](https://kubernetes.io/docs/concepts/services-networking/topology-aware-hints/)
topologyAwareHints:
  disabled: false


# -- [Assign custom Pod Topology Spread Constraints to the deployment](https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/)
topologySpreadConstraints:
  # -- If set to true it enables topologySpreadConstraints
  # @default -- "false"
  enabled: false
  # -- [If azspread is enabled pods will be distributed across different Availability Zones](https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/#example-multiple-topologyspreadconstraints)
  azspread:
    # -- If set to true, pods will be distributed across availablity zones
    # @default -- "false"
    enabled: false
    # --  If you want to override the whenUnsatisfiable condition of topologySpreadConstraints you can modify "DoNotSchedule"
    # @default -- "DoNotSchedule"
    whenUnsatisfiable: "DoNotSchedule"
  # -- If nodespread is enabled, pods will be distributed across different Worker Nodes.
  # Warning - You have to remove pod anti-affinity to spread pods across nodes when you enable nodespread(which does the same). It's recommended to use topologyspread instead of pod anti-affinity.
  # See the Motivation section of topology spread document [User story](https://github.com/kubernetes/enhancements/tree/master/keps/sig-scheduling/895-pod-topology-spread#user-stories)
  nodespread:
    # -- If set to it true pods will be distributed across different nodes
    # @default -- "false"
    enabled: false
    # --  If you want to override the whenUnsatisfiable condition of topologySpreadConstraints you can modify "DoNotSchedule"
    # @default -- "DoNotSchedule"
    whenUnsatisfiable: "DoNotSchedule"
  # -- Any additional topologySpreadConstraints config can be added by using additionalConfig option as below.
  # Note - labelSelector is added from the template. You don't have to define in the values file
  additionalConfig: []
  #- maxSkew: 1
  #  topologyKey: "<label>"
  #  whenUnsatisfiable: ScheduleAnyway
  #- maxSkew: 1
  #  topologyKey: "<label>"
  #  whenUnsatisfiable: ScheduleAnyway


istio:
  # -- to enable creation of Virtual Service and Destination Rule and other annotations in Service (Required for canary deployment with trafficRouting)
  enabled: true
  # -- to enable sidecar injection (it's enabled in lack of this flag)
  injectSidecar: true
  # -- namespaces where we will export istio objects to besides the current namespace. put "zone-traffic" here if your service is accessed via ingress.
  serviceExportTo: [ ]
  # -- hostnames using which the service can be referred to. these hostnames can only be interpreted by envoy sidecar in the namespaces specified in serviceExportTo
  hosts: [ ]
  destinationRule:
    # -- to create custom DestinationRule for this service. (Required for canary deployment with trafficRouting)
    enabled: true
    # -- override ".spec" section of DestinationRule completely.
    override: false
    # -- append this ".spec" section of DestinationRule
    additionalSpec:
  virtualService:
    # -- to create custom VirtualSerivce for this service. (Required for canary deployment with trafficRouting)
    enabled: true
    # -- override ".spec" section of VirtualService completely.
    override: false
    # -- append this ".spec" section of VirtualService
    additionalSpec:

rollout:
  # -- enable argo rollout for a deployment.
  enabled: true
  # -- override ".spec" section of Rollout completely.
  override: false
  # -- do a rolling update of the deployment rather than a canary or blue-green rollout
  rollingUpdate: false
  # -- append this to ".spec" section of Rollout
  additionalSpec:
  strategy:
    canary:
      # -- use [canary deployment](https://argoproj.github.io/argo-rollouts/features/canary/).
      enabled: true
      # -- override ".spec.strategy.canary" section of Rollout completely
      override: false
      # -- append this to ".spec.strategy.canary" section of Rollout
      additionalSpec:
      trafficRouting:
        # -- to enable [traffic splitting using istio](https://argoproj.github.io/argo-rollouts/features/traffic-management/istio/#subset-level-traffic-splitting). If disabled, cannary deployment will be done using the best effort percentage of pods of the application. Recommend by OMS Applications and Application without Isito.
        enabled: true
        # -- override ".spec.strategy.canary.trafficRouting" section of Rollout completely
        override: false
        # -- append this to ".spec.strategy.canary.trafficRouting" section of Rollout
        additionalSpec:
      steps:
        # -- Disabling it, will change Canary to Rolling Update functionally
        enabled: true
        #  -- override ".spec.strategy.canary.steps" section of Rollout completely
        override: false
        # -- First send this % traffic to the canary pods
        initialWeight: 10m
        # -- Wait for this much time before moving to any next steps
        initialPause: 10m
        # -- add this to ".spec.strategy.canary.steps" section of Rollout
        additionalSpec:
        # For manual promotion of rollout / infinite wait
        # - pause: {}
      analysis:
        # -- enable automated analysis of rollout. If you are not using istio or using OMS Applications(with TCP), please disable this or override this with your own.
        enabled: true
        # -- override ".spec.strategy.canary.analysis" section of Rollout completely
        override: false
        # -- add this to ".spec.strategy.canary.analysis" section of Rollout
        additionalSpec:
        # -- (only with istio) this fractions of traffic comming to the canary pods must have 2xx response to promote the canary deployment
        successThreshold: 0.95
        # -- (only with istio) this is the minimum number of requests canary pods must receive to promote the canary deployment
        minimumRequests: 100
        # -- (only with istio) number of time s to retry the analysis, before aborting the rollout
        maximumTries: 10

olympusLabels:
  # -- cluster name. global can override. Example: "Apollo"
  olympusCluster: cluster-name
  # -- BU name. global can override. Example: "Commons"
  olympusClusterBU: bu-name
  # -- Team Name. global can override. Example: `Compute-Infra`
  olympusClusterTeam: cluster-team
  # -- Zone Name. global can override. Example: `aws-common-prod-mumbai`
  olympusZone: zone-name
  # -- Zone Environment. global can override. Example: `production`
  olympusZoneEnv: zone-env

