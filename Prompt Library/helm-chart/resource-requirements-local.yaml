# Local Kubernetes resource requirements for zeta-prompt-library
# Applied via 'make helm-setup-infra' before Helm install.
#
# In production these resources are provided by the Olympus platform.
# For local testing (Colima/k3s) they must be created manually.
---
apiVersion: v1
kind: Namespace
metadata:
  name: zeta-prompt-library
---
# Stub ConfigMap required by the common chart's deployment template.
# Values are not used by the app — only the existence matters locally.
apiVersion: v1
kind: ConfigMap
metadata:
  name: olympus-cluster-properties-configmap
  namespace: zeta-prompt-library
data:
  OLYMPUS_CLUSTER: local
  OLYMPUS_CLUSTER_BU: local
  OLYMPUS_CLUSTER_TEAM: local
  OLYMPUS_ZONE: local
  OLYMPUS_ZONE_ENV: local
---
# PostgreSQL for local development only.
# In production, PostgreSQL is provisioned by the Olympus platform.
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: zeta-prompt-library
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zeta-prompt-library
  labels:
    app: postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "agent_nexus_zeta_prompt_library_pg_0_0"
            - name: POSTGRES_PASSWORD
              value: "changeme"
            - name: POSTGRES_DB
              value: "agent_nexus_zeta_prompt_library_pg_0_0"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U agent_nexus_zeta_prompt_library_pg_0_0 -d agent_nexus_zeta_prompt_library_pg_0_0
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U agent_nexus_zeta_prompt_library_pg_0_0 -d agent_nexus_zeta_prompt_library_pg_0_0
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
