# Application identification
nameOverride: zeta-prompt-library
fullnameOverride: zeta-prompt-library

# Deployment configuration
replicaCount: 1

# HPA configuration (disabled for local testing)
hpa:
  enabled: false

# Container image (production ECR defaults)
image:
  repository: 813361731051.dkr.ecr.ap-south-1.amazonaws.com
  repositoryPath: zeta-prompt-library
  pullPolicy: IfNotPresent
  tag: "0.1.5"

envs:
  - name: environmentName
    value: production

# Environment variables stored in ConfigMap (loaded via envFrom in deployment)
# Note: Branding and features are baked into Docker image at build-time
# Only runtime configuration (auth, database) is provided here
# Common-chart template expects envProperties map
envProperties:
  # Timezone configuration for consistent logging and template timestamps
  TZ: Asia/Kolkata
  
  # Database connection and authentication (sensitive - Vault injected in production)
  # For local testing, these are overridden in values-local.yaml
  # When deployed via umbrella chart (cluster_spec), DATABASE_URL/DIRECT_URL are
  # overridden by the parent with ganymede vault paths.
  # Standalone deployment uses these paths.
  DATABASE_URL: vault:secrets/data/cluster/agent-nexus/zeta-prompt-library/application#PG_CONNECTION_URL
  DIRECT_URL: vault:secrets/data/cluster/agent-nexus/zeta-prompt-library/application#PG_CONNECTION_URL
  AUTH_SECRET: vault:secrets/data/cluster/agent-nexus/zeta-prompt-library/application#AUTH_SECRET
  AUTH_TRUST_HOST: "true"
  # NEXTAUTH_URL is zone-specific — override in zone-values (e.g., zdd-zeta-in-ciaasprod)
  NEXTAUTH_URL: "https://prompthub.internal.ciaas.zetaapps.in"
  GITHUB_CLIENT_ID: vault:secrets/data/cluster/agent-nexus/zeta-prompt-library/application#GITHUB_CLIENT_ID
  GITHUB_CLIENT_SECRET: vault:secrets/data/cluster/agent-nexus/zeta-prompt-library/application#GITHUB_CLIENT_SECRET
  
  # Optional: AI features (uncomment if needed)
  # OPENAI_API_KEY: vault:secrets/data/cluster/zeta-prompt-library/application#OPENAI_API_KEY
  
  # Optional: Enable database seeding on first run (development only)
  # SEED_DATABASE: "false"

# Resource requests and limits
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Service configuration
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  healthCheckPath: /api/health
  # Next.js app needs time to build and initialize
  livenessProbeInitialDelaySeconds: 60
  livenessFrequency: 30
  livenessFailureThreshold: 5
  # Readiness can be more aggressive once liveness passes
  readinessProbeInitialDelaySeconds: 30
  readinessFrequency: 10
  readinessFailureThreshold: 3
  # Startup probe for slow-starting containers
  startupProbeEnabled: true
  startupProbeInitialDelaySeconds: 0
  startupProbeFrequency: 5
  startupProbeFailureThreshold: 12

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Service Monitor (Prometheus)
serviceMonitor:
  enabled: false
  monitors: []

httpHealthCheckServiceMonitor:
  enabled: false

jmxScrapeConfig:
  disabled: true

springbootHttpScrapeConfig:
  disabled: true

omsHttpScrapeConfig:
  disabled: true

# Service Account
serviceAccountName: zeta-prompt-library

# Node affinity and tolerations
affinity: {}
tolerations: []
nodeSelector: {}

# Health check annotations for zone monitoring
additionalPodAnnotations:
  health.check.enable: 'true'
  health.check.module: http_2xx
  health.check.path: /api/health
