name: CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Unit & integration tests
        run: pnpm test
        env:
          # Never call external APIs in CI — the gateway falls back to
          # simulation when these are unset, which is exactly what we want.
          NODE_ENV: test

      - name: Gateway smoke test
        run: |
          pnpm --filter @agentos/gateway start &
          GATEWAY_PID=$!
          # Wait up to 30 s for the health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Gateway healthy after ${i}s"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health | tee /tmp/health.json
          kill $GATEWAY_PID || true
        continue-on-error: true
